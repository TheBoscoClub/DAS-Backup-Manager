# btrbk configuration for CachyOS offline backup
# Version: 1.0.0
# Date: 2026-02-03
#
# This config backs up to TerraMaster D6-320 DAS drives:
#   Drive 1 (sde): System backup - NVMe + SSD subvolumes
#   Drive 2 (sdf): Data backup - ClaudeCodeProjects + Audiobook sources
#
# Usage:
#   sudo btrbk -c /etc/btrbk/btrbk.conf run
#   sudo btrbk -c /etc/btrbk/btrbk.conf dryrun  # preview only
#
# Prerequisites:
#   1. Mount top-level subvolumes (backup-run.sh does this automatically):
#      mount -o subvolid=5 /dev/nvme0n1p2 /.btrfs-nvme
#      mount -o subvolid=5 /dev/sdb /.btrfs-ssd
#      mount -o subvolid=5 /dev/sda /.btrfs-hdd
#   2. Mount DAS backup drives:
#      mount /dev/sde2 /mnt/backup-system
#      mount /dev/sdf /mnt/backup-data

# ============================================================================
# GLOBAL SETTINGS
# ============================================================================

# Transaction log for tracking operations
transaction_log         /var/log/btrbk.log

# Use mbuffer for buffered transfers with progress
stream_buffer           256m

# Compression for send streams (reduces I/O, good for SMR drives)
stream_compress         zstd

# Lock file to prevent concurrent runs
lockfile                /var/lock/btrbk.lock

# ============================================================================
# RETENTION POLICY
# ============================================================================

# Source snapshots (on live system) - keep minimal, these are for send reference
snapshot_preserve_min   latest
snapshot_preserve       2d

# Target snapshots (on backup drives) - this is the actual backup history
target_preserve_min     latest
target_preserve         4w 2m

# ============================================================================
# DRIVE 1: SYSTEM BACKUP (NVMe + SSD subvolumes)
# Target: /dev/sde2 mounted at /mnt/backup-system
# ============================================================================

# --- NVMe Subvolumes ---
volume /.btrfs-nvme
  snapshot_dir          .btrbk-snapshots
  target                /mnt/backup-system/nvme

  # Root filesystem
  subvolume             @
    snapshot_name       root

  # Home directory
  subvolume             @home
    snapshot_name       home

  # Root user home
  subvolume             @root
    snapshot_name       root-home

  # System logs
  subvolume             @log
    snapshot_name       log

# --- SSD Subvolumes ---
volume /.btrfs-ssd
  snapshot_dir          .btrbk-snapshots
  target                /mnt/backup-system/ssd

  # /opt - applications
  subvolume             @opt
    snapshot_name       opt

  # /srv - services data
  subvolume             @srv
    snapshot_name       srv

# ============================================================================
# DRIVE 2: DATA BACKUP (ClaudeCodeProjects + Audiobook sources)
# Target: /dev/sdf mounted at /mnt/backup-data
# ============================================================================

# --- ClaudeCodeProjects (all project subvolumes) ---
volume /.btrfs-hdd
  snapshot_dir          ClaudeCodeProjects/.btrbk-snapshots
  target                /mnt/backup-data/projects

  # Main projects container
  subvolume             ClaudeCodeProjects
    snapshot_name       claude-projects

# --- Audiobook Sources (irreplaceable original files) ---
volume /.btrfs-hdd
  snapshot_dir          Audiobooks/.btrbk-snapshots
  target                /mnt/backup-data/audiobooks

  # Main Audiobooks subvolume (contains Sources, data, scripts, failed-sources)
  # Note: Library/ is excluded via btrbk's subvolume handling -
  # we backup the whole Audiobooks subvolume but Library/ content is re-derivable
  subvolume             Audiobooks
    snapshot_name       audiobooks-sources

# ============================================================================
# NOTES
# ============================================================================
#
# What gets backed up:
#   Drive 1 (~500G):
#     - NVMe: @, @home, @root, @log
#     - SSD: @opt, @srv
#
#   Drive 2 (~600G):
#     - ClaudeCodeProjects (all subvolumes, ~100G)
#     - Audiobooks/Sources (~509G)
#     - Audiobooks/Sources-* (GooglePlay, Librivox, etc.)
#     - Audiobooks/failed-sources, data, scripts
#
# What is NOT backed up (intentionally excluded):
#     - Audiobooks/Library/ (opus conversions - re-derivable from sources)
#     - VirtualMachines (recreatable from ISOs)
#     - SteamLibrary (re-downloadable)
#     - ai-models-* (re-downloadable from HuggingFace)
#     - /var/cache (rebuilt automatically)
#
# Mirror schedule (manual, via dd or btrfs-clone):
#     - Monthly: Drive 1 → Drive 3, Drive 2 → Drive 4
#
