<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
    "http://www.freedesktop.org/standards/busconfig/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the bus name -->
  <policy user="root">
    <allow own="org.dasbackup.Helper1"/>
  </policy>

  <!-- Any user can call methods (polkit handles authorization) -->
  <policy context="default">
    <allow send_destination="org.dasbackup.Helper1"/>
    <allow receive_sender="org.dasbackup.Helper1"/>
  </policy>
</busconfig>
