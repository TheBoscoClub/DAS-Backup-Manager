<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Hard drive body -->
  <rect x="4" y="12" width="40" height="24" rx="3" ry="3" fill="#546e7a" stroke="#37474f" stroke-width="1.5"/>
  <!-- Drive platter -->
  <circle cx="22" cy="24" r="9" fill="#78909c" stroke="#607d8b" stroke-width="1"/>
  <circle cx="22" cy="24" r="5" fill="#90a4ae" stroke="#78909c" stroke-width="0.5"/>
  <circle cx="22" cy="24" r="1.5" fill="#37474f"/>
  <!-- Read arm -->
  <line x1="22" y1="24" x2="30" y2="17" stroke="#37474f" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Activity LED -->
  <circle cx="39" cy="30" r="2" fill="#4caf50"/>
  <!-- BTRFS badge (bottom-right corner) -->
  <rect x="32" y="28" width="14" height="10" rx="2" ry="2" fill="#ff6f00" stroke="#e65100" stroke-width="0.5"/>
  <text x="39" y="35.5" font-family="sans-serif" font-size="6" font-weight="bold" fill="white" text-anchor="middle">B</text>
</svg>
