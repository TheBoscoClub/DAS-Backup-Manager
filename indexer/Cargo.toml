[package]
name = "das-index"
version = "0.1.0"
edition = "2024"
description = "Content indexer for DAS backup snapshots — SQLite FTS5 with span-based storage"
license = "GPL-3.0"

[dependencies]
rusqlite = { version = "0.38", features = ["bundled"] }
clap = { version = "4.5", features = ["derive"] }
walkdir = "2.5"
regex = "1"

[dev-dependencies]
tempfile = "3"
