app-id: org.theboscoclub.btrdasd-gui
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: btrdasd-gui

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # D-Bus access to btrdasd-helper for privileged operations
  - --system-talk-name=org.dasbackup.Helper1
  # Read-only access to home for locating the backup SQLite database
  - --filesystem=home:ro
  # Read-only access to /var/lib/das-backup for default DB location
  - --filesystem=/var/lib/das-backup:ro

modules:
  - name: btrdasd-gui
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_GUI=ON
      - -DBUILD_INDEXER=OFF
      - -DBUILD_HELPER=OFF
      - -DBUILD_FFI=OFF
    sources:
      - type: archive
        url: https://github.com/TheBoscoClub/DAS-Backup-Manager/archive/v0.7.3.tar.gz
        sha256: SKIP
